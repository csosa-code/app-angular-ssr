<div class="bg-slate-900 h-44 bg-opacity-25 hover:bg-slate-700 rounded-lg shadow-md flex flex-col p-4 items-center justify-center cursor-pointer" 
[routerLink]="['/pokemon', pokemon()?.id]"
>
    <img 
    [src]="imageUrl()" alt="pokemon image"
    class="w-24 h-24"
    width="96px"
    height="96px"
    >
    <div class="text-center mt-2">
        <h2 class="text-xl font-bold capitalize text-white">{{ pokemon()?.name }}</h2>
    </div>
</div>
